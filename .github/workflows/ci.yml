name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify backend imports
        run: python -m compileall app

      - name: Start API and check health endpoint
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          UVICORN_PID=$!
          trap "kill $UVICORN_PID" EXIT

          for i in {1..15}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done

          echo "Backend health check failed"
          exit 1

  docker:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config

      - name: Build and start backend container
        run: docker compose up -d --build backend

      - name: Check backend health endpoint
        run: |
          for i in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done

          echo "Docker backend health check failed"
          docker compose logs backend
          exit 1

      - name: Stop containers
        if: always()
        run: docker compose down --volumes --remove-orphans
