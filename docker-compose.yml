services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${COMPOSE_DB_NAME:-airhealth}
      MYSQL_USER: ${COMPOSE_DB_USER:-airhealth}
      MYSQL_PASSWORD: ${COMPOSE_DB_PASSWORD:-airhealth}
      MYSQL_ROOT_PASSWORD: ${COMPOSE_MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./node-red/createdatabase.sql:/docker-entrypoint-initdb.d/01-createdatabase.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${COMPOSE_MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    restart: unless-stopped
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}
      DB_HOST: ${COMPOSE_DB_HOST:-mysql}
      DB_PORT: ${COMPOSE_DB_PORT:-3306}
      DB_USER: ${COMPOSE_DB_USER:-airhealth}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:-airhealth}
      DB_NAME: ${COMPOSE_DB_NAME:-airhealth}
      DB_POOL_SIZE: ${COMPOSE_DB_POOL_SIZE:-5}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  node-red:
    image: nodered/node-red:4.0
    restart: unless-stopped
    ports:
      - "1880:1880"
    environment:
      TZ: ${TZ:-Asia/Bangkok}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - nodered_data:/data
      - ./node-red:/data/project:ro

volumes:
  mysql_data:
  nodered_data:
