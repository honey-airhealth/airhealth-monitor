services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      DB_HOST: ${DB_HOST:-iot.cpe.ku.ac.th}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-1}

  frontend:
    profiles:
      - frontend
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
