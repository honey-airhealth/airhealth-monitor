services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173

  frontend:
    profiles:
      - frontend
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
